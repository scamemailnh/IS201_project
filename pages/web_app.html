<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
    <link href="../css/snake.css" rel="stylesheet">
    <title>Hopelessly lost</title>
</head>
<body>
    <!-- topline menu -->
    <ul id="menu_list">menu
        <li><a href="../index.html">Home</a></li>
        <li><a href="resume.html">Resume</a></li>
        <li><a href="web_app.html">Project</a></li>
    </ul>
    <!-- background -->
     <h1>SNAKE</h1>

<div class="hud">
  <div class="hud-item"><span>SCORE</span><span id="score">0</span></div>
  <div class="hud-item"><span>BEST</span><span id="best">0</span></div>
  <div class="hud-item"><span>LVL</span><span id="level">1</span></div>
</div>

<div class="arena-wrap">
  <canvas id="game"></canvas>

  <!-- Start screen -->
  <div class="overlay" id="startScreen">
    <h2>READY?</h2>
    <p class="sub">EAT THE RED DOTS<br>DON'T HIT THE WALLS<br>DON'T EAT YOURSELF</p>
    <button class="btn" id="startBtn">START GAME</button>
  </div>

  <!-- Game-over screen -->
  <div class="overlay hidden" id="gameOverScreen">
    <h2>GAME OVER</h2>
    <div class="final-score" id="finalScore">0 PTS</div>
    <button class="btn" id="restartBtn">PLAY AGAIN</button>
  </div>
</div>

<div class="controls">
  WASD / ARROW KEYS TO MOVE &nbsp;|&nbsp; P TO PAUSE
</div>

<div class="dpad">
  <div class="dpad-row"><div class="dpad-spacer"></div><button class="dpad-btn" data-dir="UP">▲</button><div class="dpad-spacer"></div></div>
  <div class="dpad-row"><button class="dpad-btn" data-dir="LEFT">◀</button><div class="dpad-spacer"></div><button class="dpad-btn" data-dir="RIGHT">▶</button></div>
  <div class="dpad-row"><div class="dpad-spacer"></div><button class="dpad-btn" data-dir="DOWN">▼</button><div class="dpad-spacer"></div></div>
</div>

<script>
  // ─── CONFIG ───────────────────────────────────────────────────────────────
  const COLS = 24, ROWS = 24, CELL = 22;
  const BASE_SPEED = 140; // ms per tick at level 1
  const SPEED_STEP = 8;   // ms faster per level
  const PTS_PER_FOOD = 10;
  const LEVEL_EVERY  = 5;  // foods per level-up

  // ─── CANVAS SETUP ─────────────────────────────────────────────────────────
  const canvas = document.getElementById('game');
  const ctx    = canvas.getContext('2d');
  canvas.width  = COLS * CELL;
  canvas.height = ROWS * CELL;

  // ─── STATE ─────────────────────────────────────────────────────────────────
  let snake, dir, nextDir, food, score, best, level, foodEaten;
  let gameLoop = null, running = false, paused = false;

  const $ = id => document.getElementById(id);

  function loadBest() { return parseInt(localStorage.getItem('snakeBest') || '0'); }
  function saveBest(v) { localStorage.setItem('snakeBest', v); }

  // ─── INIT ──────────────────────────────────────────────────────────────────
  function init() {
    snake     = [{ x: 12, y: 12 }, { x: 11, y: 12 }, { x: 10, y: 12 }];
    dir       = { x: 1, y: 0 };
    nextDir   = { x: 1, y: 0 };
    score     = 0;
    level     = 1;
    foodEaten = 0;
    best      = loadBest();
    placeFood();
    updateHUD();
    draw();
  }

  function placeFood() {
    let pos;
    do {
      pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
    } while (snake.some(s => s.x === pos.x && s.y === pos.y));
    food = pos;
  }

  // ─── GAME TICK ─────────────────────────────────────────────────────────────
  function tick() {
    if (!running || paused) return;

    dir = { ...nextDir };
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // wall collision
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return endGame();
    // self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) return endGame();

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score += PTS_PER_FOOD * level;
      foodEaten++;
      if (foodEaten % LEVEL_EVERY === 0) level++;
      if (score > best) { best = score; saveBest(best); }
      placeFood();
      updateHUD();
      reschedule();
    } else {
      snake.pop();
    }

    draw();
  }

  function reschedule() {
    clearInterval(gameLoop);
    const speed = Math.max(50, BASE_SPEED - (level - 1) * SPEED_STEP);
    gameLoop = setInterval(tick, speed);
  }

  // ─── DRAWING ───────────────────────────────────────────────────────────────
  const COL_SNAKE  = getComputedStyle(document.documentElement).getPropertyValue('--snake').trim();
  const COL_SNAKE2 = getComputedStyle(document.documentElement).getPropertyValue('--snake2').trim();
  const COL_FOOD   = getComputedStyle(document.documentElement).getPropertyValue('--food').trim();
  const COL_PANEL  = getComputedStyle(document.documentElement).getPropertyValue('--panel').trim();
  const COL_DIM    = getComputedStyle(document.documentElement).getPropertyValue('--dim').trim();

  function draw() {
    // background + grid
    ctx.fillStyle = COL_PANEL;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.strokeStyle = 'rgba(0,255,136,0.05)';
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= COLS; x++) {
      ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, canvas.height); ctx.stroke();
    }
    for (let y = 0; y <= ROWS; y++) {
      ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(canvas.width, y * CELL); ctx.stroke();
    }

    // food — glowing circle
    const fx = food.x * CELL + CELL / 2, fy = food.y * CELL + CELL / 2, fr = CELL / 2 - 3;
    const grd = ctx.createRadialGradient(fx, fy, 1, fx, fy, fr + 6);
    grd.addColorStop(0, COL_FOOD);
    grd.addColorStop(1, 'transparent');
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(fx, fy, fr + 6, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = COL_FOOD;
    ctx.shadowColor = COL_FOOD; ctx.shadowBlur = 14;
    ctx.beginPath(); ctx.arc(fx, fy, fr, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;

    // snake
    snake.forEach((seg, i) => {
      const t = i / snake.length;
      ctx.fillStyle = i === 0 ? COL_SNAKE : interpolateColor(COL_SNAKE, COL_SNAKE2, t);
      ctx.shadowColor = i === 0 ? COL_SNAKE : 'transparent';
      ctx.shadowBlur  = i === 0 ? 10 : 0;

      const pad = i === 0 ? 1 : 2;
      roundRect(ctx, seg.x * CELL + pad, seg.y * CELL + pad, CELL - pad * 2, CELL - pad * 2, 4);
      ctx.fill();
    });
    ctx.shadowBlur = 0;
  }

  function roundRect(c, x, y, w, h, r) {
    c.beginPath();
    c.moveTo(x + r, y);
    c.lineTo(x + w - r, y); c.arcTo(x + w, y, x + w, y + r, r);
    c.lineTo(x + w, y + h - r); c.arcTo(x + w, y + h, x + w - r, y + h, r);
    c.lineTo(x + r, y + h); c.arcTo(x, y + h, x, y + h - r, r);
    c.lineTo(x, y + r); c.arcTo(x, y, x + r, y, r);
    c.closePath();
  }

  // simple hex lerp
  function interpolateColor(a, b, t) {
    const pa = hexParse(a), pb = hexParse(b);
    return `rgb(${Math.round(pa[0]+(pb[0]-pa[0])*t)},${Math.round(pa[1]+(pb[1]-pa[1])*t)},${Math.round(pa[2]+(pb[2]-pa[2])*t)})`;
  }
  function hexParse(h) {
    h = h.replace('#','');
    return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)];
  }

  // ─── GAME FLOW ─────────────────────────────────────────────────────────────
  function startGame() {
    $('startScreen').classList.add('hidden');
    $('gameOverScreen').classList.add('hidden');
    init();
    running = true;
    reschedule();
  }

  function endGame() {
    running = false;
    clearInterval(gameLoop);
    $('finalScore').textContent = score + ' PTS';
    $('gameOverScreen').classList.remove('hidden');
  }

  function updateHUD() {
    $('score').textContent = score;
    $('best').textContent  = best;
    $('level').textContent = level;
  }

  // ─── INPUT ─────────────────────────────────────────────────────────────────
  const DIRS = {
    ArrowUp: {x:0,y:-1}, ArrowDown: {x:0,y:1}, ArrowLeft: {x:-1,y:0}, ArrowRight: {x:1,y:0},
    w: {x:0,y:-1}, s: {x:0,y:1}, a: {x:-1,y:0}, d: {x:1,y:0},
    W: {x:0,y:-1}, S: {x:0,y:1}, A: {x:-1,y:0}, D: {x:1,y:0},
    UP: {x:0,y:-1}, DOWN: {x:0,y:1}, LEFT: {x:-1,y:0}, RIGHT: {x:1,y:0},
  };

  function applyDir(d) {
    if (!d) return;
    // prevent reversing
    if (d.x === -dir.x && d.y === -dir.y) return;
    nextDir = d;
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'p' || e.key === 'P') {
      if (running) { paused = !paused; if (!paused) reschedule(); }
      return;
    }
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
    if (running) applyDir(DIRS[e.key]);
  });

  document.querySelectorAll('.dpad-btn').forEach(btn => {
    btn.addEventListener('touchstart', e => {
      e.preventDefault();
      if (running) applyDir(DIRS[btn.dataset.dir]);
    }, { passive: false });
    btn.addEventListener('click', () => {
      if (running) applyDir(DIRS[btn.dataset.dir]);
    });
  });

  // swipe support
  let touchStart = null;
  canvas.addEventListener('touchstart', e => { touchStart = e.touches[0]; }, { passive: true });
  canvas.addEventListener('touchend', e => {
    if (!touchStart) return;
    const dx = e.changedTouches[0].clientX - touchStart.clientX;
    const dy = e.changedTouches[0].clientY - touchStart.clientY;
    if (Math.abs(dx) > Math.abs(dy)) applyDir(dx > 0 ? DIRS.RIGHT : DIRS.LEFT);
    else applyDir(dy > 0 ? DIRS.DOWN : DIRS.UP);
    touchStart = null;
  }, { passive: true });

  $('startBtn').addEventListener('click', startGame);
  $('restartBtn').addEventListener('click', startGame);

  // ─── BOOT ──────────────────────────────────────────────────────────────────
  best = loadBest();
  updateHUD();
  init(); // draw initial static frame
</script>
</body>
</html>
